<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="HTML5 Icecast/Shoutcast Radio Player with PWA support.">
    <title>Radio Player</title>
    
    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="img/cover.png" />
    <link rel="apple-touch-icon" href="img/cover.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cover-site">
        <div id="bgCover"></div>
        <div class="bg-mask"></div>
    </div>
    <main>
        <section id="player">
            <div class="container">
                <div class="row web-player">
                    <div class="col-12 col-lg-10">
                        <div class="row">
                            <div class="col-12 col-md-5">
                                <div class="cover-album">
                                    <div id="currentCoverArt"></div>
                                    <div class="watermark"></div>
                                </div>
                            </div>
                            <div class="col-12 ml-md-auto col-md-6">
                                <div class="row">
                                    <div class="col-12">
                                        <div class="info-current-song">
                                            <h2 id="currentSong" class="current-song text-uppercase">Song</h2>
                                            <h3 id="currentArtist" class="current-artist text-captalize">Artist</h3>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="row">
                                            <div class="play-pause col-12 col-md-2 text-center">
                                                <i id="playerButton" class="fa fa-play-circle" role="button" tabindex="0" aria-label="Play or pause"></i>
                                            </div>
                                            <div class="col-12 col-md-10 text-center">
                                                <div class="row volume-control">
                                                    <div class="volume-icon col-1"><i class="fa fa-volume-up" aria-hidden="true"></i></div>
                                                    <div class="volume-slide col-10 text-center">
                                                        <input type="range" id="volume" step="1" min="0" max="100" value="80" aria-label="Volume">
                                                    </div>
                                                    <div class="percentual-volume col-12">Volume <span id="volIndicator">80</span>%</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-12 col-md-6 text-center call-lyrics">
                                                <a href="#" class="lyrics" data-toggle="modal" data-target="#modalLyrics" role="button">Show Lyrics</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row historic">
                    <div class="col-12">
                        <h2>History</h2>
                        <div class="row" id="historicSong">
                            <article class="col-12 col-md-6">
                                <div class="cover-historic"></div>
                                <div class="music-info">
                                    <div class="song">No Song</div>
                                    <div class="artist">No Artist</div>
                                </div>
                            </article>
                            <article class="col-12 col-md-6">
                                <div class="cover-historic"></div>
                                <div class="music-info">
                                    <div class="song">No Title</div>
                                    <div class="artist">No Artist</div>
                                </div>
                            </article>
                            <article class="col-12 col-md-6">
                                <div class="cover-historic"></div>
                                <div class="music-info">
                                    <div class="song">No Song</div>
                                    <div class="artist">No Artist</div>
                                </div>
                            </article>
                            <article class="col-12 col-md-6">
                                <div class="cover-historic"></div>
                                <div class="music-info">
                                    <div class="song">No Title</div>
                                    <div class="artist">No Artist</div>
                                </div>
                            </article>
                        </div>
                    </div>
                </div>
                

                <!-- Footer -->
                <div class="row mt-5 mb-5">
                    <div class="col-12 text-center text-white" style="text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); font-family: 'Poppins', sans-serif;">
                        <hr style="border-top: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px;">
                        <h4 class="font-weight-bold text-uppercase">Happy Radio - Always Happy!</h4>
                        <p class="mb-4" style="font-size: 16px;">
                            Our Studio Number and SMS number are <br>
                            <a href="tel:0485933944" style="color: #00E1E7; font-weight: bold; text-decoration: none;">0485 933 944</a>
                        </p>
                        <a href="https://buymeacoffee.com/happyradio" target="_blank" class="support-btn" rel="noopener noreferrer">Support Us</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="modalLyrics" tabindex="-1" role="dialog" aria-labelledby="lyricsSong" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="lyricsSong">Lyrics</h5>
                    <button type="button" style="color: #fff" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="lyric"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.marquee@1.6.0/jquery.marquee.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function (registration) {
                        console.log('Service Worker registered successfully:', registration.scope);
                    })
                    .catch(function (err) {
                        console.error('Service Worker registration failed:', err);
                    });
            });
        }
    </script>
</body>
</html>
